services:
  postgres:
    image: postgres:17
    container_name: cbeave-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: cbeave
      POSTGRES_USER: cbeave
      POSTGRES_PASSWORD: cbeave_dev_password

    # Windows / DBeaver / Prisma: 5433
    # Docker PostgreSQL container: 5432
    ports:
      - '127.0.0.1:5433:5432'

    volumes:
      - cbeave_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cbeave -d cbeave']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cbeave_postgres_data:
